version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: disaster_tracker_db
    environment:
      POSTGRES_USER: disaster_user
      POSTGRES_PASSWORD: disaster_pass
      POSTGRES_DB: disaster_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U disaster_user -d disaster_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: disaster_tracker_app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://disaster_user:disaster_pass@postgres:5432/disaster_tracker
      NASA_EONET_API: https://eonet.gsfc.nasa.gov/api/v3/events
      DISASTER_RADIUS_KM: 100.0
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
